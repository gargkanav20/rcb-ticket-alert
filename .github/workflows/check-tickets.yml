name: Check RCB Tickets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore ticket state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: ticket-state-v1

      - name: Run ticket checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          STATE_FILE_PATH: state.json
        run: python -m src.main --duration 58 --interval 120

      - name: Save ticket state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: ticket-state-v1-${{ github.run_id }}

      - name: Re-trigger on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'check-tickets.yml',
              ref: 'main',
            });
